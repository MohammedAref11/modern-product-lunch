<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css">
    <title>main</title>
  </head>
  <body class="">
    <header class="md:relative max-w-[1600px] mx-auto max-md:sticky max-md:top-0 z-20 max-md:bg-white">
      <nav id="navBar" class="group px-6 py-5 flex flex-col md:flex-row items-center md:justify-between rounded-b-3xl max-md:shadow-sm">
        <div class="flex justify-between w-full md:w-auto">
          <p class="font-dmsans-regular text-2xl cursor-pointer">Modern</p >
          <div id="hamMenu" class="flex flex-col justify-center gap-1 md:hidden">
            <span class="bg-custom-black w-5 h-0.5 inline-block group-[.clicked]:rotate-45 duration-200 group-[.clicked]:translate-y-3"></span>
            <span class="bg-custom-black w-5 h-0.5 inline-block group-[.clicked]:opacity-0 duration-200"></span>
            <span class="bg-custom-black w-5 h-0.5 inline-block group-[.clicked]:-rotate-45 duration-200"></span>
          </div>
        </div>
        <div id="navMenu" class="w-full h-auto overflow-hidden max-md:h-0 duration-600 ease-out transition-[height] z-10 md:fixed md:left-2/4 md:pointer-events-auto pointer-events-none group-[.clicked]:pointer-events-auto md:bg-white/40 md:p-3 md:rounded-full md:-translate-x-3/6 md:w-auto">
          <ul class="md:flex-row flex flex-col max-md:py-5 p-2 font-dmsans-bold w-full md:text-sm gap-4 max-md:*:border-b max-md:*:border-b-gray-100 max-md:*:py-3">
            <li class="group-[.clicked]:animate-link1 cursor-pointer hover:text-gray-600">Benefits</li>
            <li class="group-[.clicked]:animate-link2 cursor-pointer hover:text-gray-600">Specifications</li>
            <li class="group-[.clicked]:animate-link3 cursor-pointer hover:text-gray-600">How-to</li>
            <li class="group-[.clicked]:animate-link4 cursor-pointer hover:text-gray-600">Contact-Us</li>
          </ul> 
        </div>
        <button class="group/button md:flex text-white cursor-pointer hover:bg-green-400 hidden group-[.clicked]:flex gap-2 font-dmsans-bold px-5 py-3 rounded-full self-start text-sm bg-green-600">
          Learn more
          <svg width="7" height="20" viewBox="0 0 7 20" fill="none" class="group-hover/button:-translate-y-1 group-hover/button:translate-x-0.5 transition-all" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.01037 11.9877V8.04618L5.64939 8.08576L0.735155 13.0056L0 12.2705L4.91423 7.35626L4.96513 7.99528H1.0066V6.99434L6 7.00565V11.9877H5.01037Z" fill="white"/>  
          </svg>
        </button>
      </nav>
    </header>  
    <main>
      <section class="max-w-[1600px] mx-auto p-8">
        <h1 class="font-crimson-regular md:text-[130px] sm:text-9xl text-6xl text-center">Browse Everything</h1>
        <picture class="flex justify-center py-2">
          <source media="(min-width:1000px)" srcset="./assets/Desktop-Hero.webp" width="1000" height="600">
          <source media="(min-width:600px)" srcset="./assets/Tablet-Hero.webp" width="700" height="440">
          <img fetchpriority="high" src="assets/Mobile-Hero.webp" alt="" width="300" height="500">
        </picture>
      </section>

      <section class="max-w-[1600px] mx-auto px-8 py-5 border-b border-b-gray-200 ">
        <p class="font-dmsans-regular text-gray-500 py-3">Trusted By:</p>
        <div class="flex flex-wrap justify-around w-full gap-2">
          <img class="p-4" src="./assets/Logo-1.png" alt="">
          <img class="p-4" src="./assets/Logo-2.png" alt="">
          <img class="p-4" src="./assets/Logo-3.png" alt="">
          <img class="p-4" src="./assets/Logo-4.png" alt="">
          <img class="p-4" src="./assets/Logo-5b.png" alt="">
          <img class="p-4" src="./assets/Logo-6b.png" alt="">
        </div>
      </section>

      <section class="max-w-[1600px] mx-auto px-8 py-16">
        <p class="font-dmsans-regular text-sm text-green-600">Benefits:</p>
        <h2 class="py-8 font-crimson-regular text-5xl md:text-7xl lg:text-8xl">We’ve cracked the code.</h2>
        <p class="text-gray-500">Area provides real insights, without the data overload.</p>
      </section>


    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
